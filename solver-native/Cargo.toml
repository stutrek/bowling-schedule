[package]
name = "solver-native"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "solver-native"
path = "src/main.rs"

[[bin]]
name = "refine"
path = "src/refine.rs"

[dependencies]
solver-core = { path = "../solver-core" }
rand = { version = "0.9", features = ["small_rng"] }
chrono = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
ctrlc = "3.5.2"
